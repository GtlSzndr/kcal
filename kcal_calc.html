<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalória Kalkulátor</title>

<style>
body { font-family: Arial; padding: 15px; background:#f5f5f5; }
input { width: 100%; padding: 8px; margin: 5px 0; }
button { padding: 10px; margin: 5px 0; width: 100%; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; background:white; }
td, th { border: 1px solid #ddd; padding: 8px; text-align: left; }
.card { background:white; padding:10px; margin:10px 0; border-radius:10px; }
</style>
</head>

<body>

<h2>🍽 Kalória Kalkulátor</h2>

<input id="name" placeholder="Hozzávaló neve">
<input id="grams" type="number" placeholder="Súly (g)">
<input id="kcal" type="number" placeholder="Kcal / 100g">

<button onclick="addItem()">Hozzáadás</button>

<table>
<thead>
<tr>
<th>Név</th>
<th>g</th>
<th>kcal/100g</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<hr>

<input id="cooked" type="number" placeholder="Kész étel súlya (g)">
<button onclick="calculate()">Számolás</button>
<button onclick="clearAll()">Új étel</button>
<button onclick="openHistory()">Előzmények</button>

<h3 id="result"></h3>

<div id="history" style="display:none;"></div>

<script>
let ingredients = [];
let history = JSON.parse(localStorage.getItem("history") || "{}");
let db = JSON.parse(localStorage.getItem("db") || "{}");

/* SAVE */
function save(){
    localStorage.setItem("history", JSON.stringify(history));
    localStorage.setItem("db", JSON.stringify(db));
}

/* ADD ITEM */
function addItem(){
    let name = document.getElementById('name').value.toLowerCase();
    let grams = parseFloat(document.getElementById('grams').value);
    let kcal = parseFloat(document.getElementById('kcal').value);

    if (!name || grams === '' || kcal === '') return;

    db[name] = kcal;
    save();

    ingredients.push({ name, grams, kcal });

    render();

    document.getElementById('name').value = '';
    document.getElementById('grams').value = '';
    document.getElementById('kcal').value = '';
}

/* RENDER TABLE */
function render(){
    let tbody = document.getElementById('list');
    tbody.innerHTML = '';

    ingredients.forEach((i, index) => {
        tbody.innerHTML += `
        <tr>
            <td>${i.name}</td>
            <td>${i.grams}</td>
            <td>${i.kcal}</td>
        </tr>
        `;
    });
}

/* CALCULATE */
function calculate(){
    let cooked = parseFloat(document.getElementById('cooked').value);
    if (!cooked) return;

    let totalKcal = ingredients.reduce((sum, i) => 
        sum + (i.grams * i.kcal / 100), 0);

    let per100 = (totalKcal / cooked) * 100;

    document.getElementById('result').innerText =
        `Össz kcal: ${totalKcal.toFixed(1)} | 100g: ${per100.toFixed(1)}`;

    let day = new Date().toISOString().split('T')[0];

    if (!history[day]) history[day] = [];

    history[day].push({
        ingredients: JSON.parse(JSON.stringify(ingredients)),
        cooked,
        totalKcal,
        per100
    });

    save();
}

/* CLEAR */
function clearAll(){
    ingredients = [];
    render();
    document.getElementById('result').innerText = '';
    document.getElementById('cooked').value = '';
}

/* HISTORY */
function openHistory(){
    let div = document.getElementById('history');
    div.style.display = div.style.display === 'none' ? 'block' : 'none';
    div.innerHTML = '';

    Object.keys(history).reverse().forEach(day => {

        let html = `<div class="card">
        <h3>${day}</h3>`;

        history[day].forEach(m => {
            html += `
            <div style="margin-top:10px; padding:10px; border-top:1px solid #ddd;">
                <b>${m.totalKcal.toFixed(1)} kcal</b> | ${m.cooked}g<br>
                ${m.ingredients.map(x => `${x.name} (${x.grams}g)`).join(', ')}
            </div>`;
        });

        html += `</div>`;
        div.innerHTML += html;
    });
}

/* AUTOFILL FROM DB */
document.getElementById('name').addEventListener('blur', function(){
    let name = this.value.toLowerCase();
    if (db[name] !== undefined){
        document.getElementById('kcal').value = db[name];
    }
});
</script>

</body>
</html>
